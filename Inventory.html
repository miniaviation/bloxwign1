<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetWing - Inventory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b1120;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #0d1525;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 10;
    }

    .sidebar-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 2px;
    }

    .sidebar-nav {
      padding: 16px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      user-select: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
    }

    .nav-item.active {
      background: rgba(168, 85, 247, 0.12);
      color: #a855f7;
    }

    .nav-item-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .soon-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255, 180, 0, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* Online users at bottom of sidebar */
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #64748b;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.8);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── MAIN AREA ───────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── TOP BAR ─────────────────────────────────── */
    .topbar {
      height: 60px;
      background: #0d1525;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #94a3b8;
      font-size: 15px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .btn-withdraw {
      padding: 8px 18px;
      border-radius: 8px;
      background: #1e3a5f;
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-withdraw:hover { background: #1e4a7f; }

    .btn-deposit {
      padding: 8px 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(22, 163, 74, 0.35);
    }
    .btn-deposit:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ─── CONTENT ─────────────────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .inventory-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 24px;
      overflow-y: auto;
      background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(168,85,247,0.05) 0%, transparent 60%),
                  #0b1120;
    }

    /* Search + filter row */
    .filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      width: 260px;
    }

    .search-box svg { color: #475569; flex-shrink: 0; }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: #94a3b8;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      width: 100%;
    }
    .search-box input::placeholder { color: #334155; }

    .all-bots-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .all-bots-btn:hover { background: rgba(255,255,255,0.09); }

    .bot-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
    }

    /* Items grid */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .item-card {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      gap: 8px;
      user-select: none;
    }

    .item-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(168, 85, 247, 0.3);
      transform: translateY(-2px);
    }

    .item-card.deposit-card {
      border-style: dashed;
      border-color: rgba(255,255,255,0.12);
    }

    .plus-icon {
      font-size: 28px;
      color: #475569;
      line-height: 1;
    }

    /* ─── CHAT PANEL ──────────────────────────────── */
    .chat-panel {
      width: 280px;
      min-width: 280px;
      background: #0d1525;
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-title {
      font-size: 13px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .online-count {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #22c55e;
      font-weight: 600;
    }

    .online-count-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.8);
      animation: blink 2s ease-in-out infinite;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .chat-msg {
      display: flex;
      gap: 8px;
      animation: msgIn 0.25s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chat-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .chat-msg-body { flex: 1; }

    .chat-msg-name {
      font-size: 11px;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 2px;
    }

    .chat-msg-name.blue  { color: #3b82f6; }
    .chat-msg-name.green { color: #22c55e; }
    .chat-msg-name.pink  { color: #ec4899; }

    .chat-msg-text {
      font-size: 12.5px;
      color: #94a3b8;
      line-height: 1.5;
      word-break: break-word;
    }

    .chat-msg-time {
      font-size: 10px;
      color: #334155;
      margin-top: 2px;
    }

    /* Input */
    .chat-input-area {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      transition: border-color 0.2s;
    }
    .chat-input-row:focus-within { border-color: rgba(168,85,247,0.4); }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }
    .chat-input::placeholder { color: #334155; }

    .send-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { color: #a855f7; }
  </style>
</head>
<body>

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-logo">BetWing</div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="#">
        <div class="nav-item-left">
          <!-- Inventory icon -->
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
          Inventory
        </div>
      </a>
      <a class="nav-item" href="#" onclick="return false;">
        <div class="nav-item-left">
          <!-- Coinflip icon -->
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
          Coinflip
        </div>
        <span class="soon-badge">Soon</span>
      </a>
      <a class="nav-item" href="#" onclick="return false;">
        <div class="nav-item-left">
          <!-- Jackpot icon -->
          <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          Jackpot
        </div>
        <span class="soon-badge">Soon</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="online-indicator">
        <div class="online-dot"></div>
        <span id="sidebarOnline">0 online</span>
      </div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <span class="topbar-title">Inventory</span>
      <div class="topbar-actions">
        <div class="btn-icon" title="Refresh" onclick="refreshInventory()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </div>
        <button class="btn-withdraw" id="withdrawBtn">Withdraw (0)</button>
        <button class="btn-deposit" onclick="showDepositMsg()">Deposit Items</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area">

      <!-- Inventory panel -->
      <div class="inventory-panel">
        <div class="filter-row">
          <div class="search-box">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Enter item name..." oninput="filterItems()" />
          </div>
          <button class="all-bots-btn">
            <div class="bot-dot"></div>
            All Bots
          </button>
        </div>

        <div class="items-grid" id="itemsGrid">
          <!-- Deposit card always first -->
          <div class="item-card deposit-card" onclick="showDepositMsg()">
            <span class="plus-icon">+</span>
            <span>Deposit Item</span>
          </div>
        </div>
      </div>

      <!-- Chat panel -->
      <div class="chat-panel">
        <div class="chat-header">
          <span class="chat-title">Live Chat</span>
          <div class="online-count">
            <div class="online-count-dot"></div>
            <span id="onlineCount">0</span> online
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <input class="chat-input" id="chatInput" type="text" placeholder="Type a message..." maxlength="200" onkeydown="handleChatKey(event)" />
            <button class="send-btn" onclick="sendMessage()">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Fake online count ──────────────────────────
    let onlineUsers = Math.floor(Math.random() * 80) + 40;

    function updateOnline() {
      const delta = Math.floor(Math.random() * 5) - 2;
      onlineUsers = Math.max(10, onlineUsers + delta);
      document.getElementById('onlineCount').textContent = onlineUsers;
      document.getElementById('sidebarOnline').textContent = onlineUsers + ' online';
    }
    updateOnline();
    setInterval(updateOnline, 6000);

    // ── Chat data ──────────────────────────────────
    const chatNames = ['ProGrinder','xDarkWing','VaultMaster','LuckyAce','NightBlade','ShadowRex','CrownKing','IceWarden','BlazeFury','StarChaser'];
    const chatColors = ['','blue','green','pink','','blue','green','','pink','blue'];
    const chatMsgs = [
      'anyone trading?','just deposited my gear','gg wp','BetWing is gonna be insane','who wants to flip?',
      'site looking clean','waiting for jackpot to drop','how do I deposit?','ready to win big','let\'s go',
      'anyone here?','huge fan of this platform already','when does it launch?','coinflip when??','hyped for this'
    ];

    function getTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function addMsg(name, text, colorClass, scroll=true) {
      const box = document.getElementById('chatMessages');
      const initials = name.slice(0,2).toUpperCase();
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `
        <div class="chat-avatar">${initials}</div>
        <div class="chat-msg-body">
          <div class="chat-msg-name ${colorClass}">${name}</div>
          <div class="chat-msg-text">${escHtml(text)}</div>
          <div class="chat-msg-time">${getTime()}</div>
        </div>
      `;
      box.appendChild(div);
      if (scroll) box.scrollTop = box.scrollHeight;
      // Keep max 60 messages
      while (box.children.length > 60) box.removeChild(box.firstChild);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Seed with a few messages
    (function seedChat() {
      const seed = [
        [chatNames[0], 'Welcome to BetWing!', chatColors[0]],
        [chatNames[3], 'site looks fire', chatColors[3]],
        [chatNames[7], 'ready when jackpot drops', chatColors[7]],
        [chatNames[1], 'hyped for launch', chatColors[1]],
      ];
      seed.forEach(([n,m,c]) => addMsg(n,m,c,false));
      document.getElementById('chatMessages').scrollTop = 99999;
    })();

    // Random messages every few seconds
    function randomChatMsg() {
      const i = Math.floor(Math.random() * chatNames.length);
      const m = chatMsgs[Math.floor(Math.random() * chatMsgs.length)];
      addMsg(chatNames[i], m, chatColors[i]);
    }
    setInterval(randomChatMsg, Math.random() * 4000 + 3000);
    setInterval(() => { setTimeout(randomChatMsg, Math.random() * 4000 + 3000); }, 7000);

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      addMsg('You', text, 'green');
      input.value = '';
    }

    function handleChatKey(e) {
      if (e.key === 'Enter') sendMessage();
    }

    // ── Inventory ──────────────────────────────────
    let selectedCount = 0;

    function refreshInventory() {
      document.getElementById('searchInput').value = '';
      renderItems();
    }

    function renderItems(filter='') {
      const grid = document.getElementById('itemsGrid');
      // Always clear non-deposit cards
      const kids = [...grid.children];
      kids.slice(1).forEach(k => k.remove());
      // No items yet — just shows deposit card
    }

    function filterItems() {
      const val = document.getElementById('searchInput').value.toLowerCase();
      renderItems(val);
    }

    function showDepositMsg() {
      alert('Deposits are coming soon. Stay tuned for the BetWing launch!');
    }

    renderItems();
  </script>

</body>
</html>
